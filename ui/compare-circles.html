<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ateliya - Circles Variant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --primary: #a9bfa0;
            --background: #f8f7f4;
            --foreground: #1a1f2e;
            --card: #ffffff;
            --muted: #e8e6e1;
            --muted-fg: #6b7280;
            --accent: #d5d2c3;
            --surface-muted: #eef3eb;
            --surface-subtle: #faf9f7;
            --border: #e8e6e1;
            --dark-sage: #4d5e45;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #e8e6e1;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .phone {
            width: 430px;
            background: var(--background);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        .variant-tag {
            background: var(--dark-sage);
            color: #fff;
            text-align: center;
            padding: 12px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* Services Section */
        .services {
            background: var(--card);
            padding: 24px;
        }

        .label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2.5px;
            color: var(--primary);
            text-align: center;
            margin-bottom: 12px;
        }

        .service-group {
            margin-bottom: 28px;
        }

        .sub-header-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .sub-header-line {
            width: 28px;
            height: 1px;
            background: var(--accent);
        }

        .sub-header {
            font-size: 20px;
            font-weight: 700;
            color: var(--foreground);
            letter-spacing: 1px;
        }

        .sub-header-desc {
            font-size: 14px;
            color: var(--muted-fg);
            text-align: center;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Circles */
        .circle-row {
            display: flex;
            justify-content: space-between;
        }

        .circle-row-2 {
            display: flex;
            justify-content: center;
            gap: 48px;
        }

        .circle-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90px;
        }

        .circle-icon-wrap {
            position: relative;
        }

        .circle-ring {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .circle-inner {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--surface-muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-inner i { width: 20px; height: 20px; color: var(--dark-sage); }

        .circle-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--foreground);
            text-align: center;
        }

        .coming-soon {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--muted);
            padding: 2px 7px;
            border-radius: 99px;
            font-size: 8px;
            font-weight: 700;
            color: var(--muted-fg);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .pill-btn {
            display: block;
            margin: 8px auto 0;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px 36px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="variant-tag">VARIANT B — CIRCLES</div>
        <div class="services">
            <div class="label">OUR SERVICES</div>

            <!-- Kiosk -->
            <div class="service-group">
                <div class="sub-header-row">
                    <div class="sub-header-line"></div>
                    <div class="sub-header">Kiosk</div>
                    <div class="sub-header-line"></div>
                </div>
                <div class="sub-header-desc">Our physical layer — expert services at pop-up kiosks in your community.</div>

                <div class="circle-row">
                    <div class="circle-item">
                        <div class="circle-ring"><div class="circle-inner"><i data-lucide="scissors"></i></div></div>
                        <div class="circle-label">Alterations</div>
                    </div>
                    <div class="circle-item">
                        <div class="circle-ring"><div class="circle-inner"><i data-lucide="refresh-cw"></i></div></div>
                        <div class="circle-label">Repurposing</div>
                    </div>
                    <div class="circle-item">
                        <div class="circle-ring"><div class="circle-inner"><i data-lucide="shopping-bag"></i></div></div>
                        <div class="circle-label">Rental</div>
                    </div>
                </div>
            </div>

            <!-- Almira -->
            <div class="service-group">
                <div class="sub-header-row">
                    <div class="sub-header-line"></div>
                    <div class="sub-header">Almira</div>
                    <div class="sub-header-line"></div>
                </div>
                <div class="sub-header-desc">Our digital layer — intelligence and inspiration for your wardrobe.</div>

                <div class="circle-row-2">
                    <div class="circle-item">
                        <div class="circle-ring"><div class="circle-inner"><i data-lucide="sparkles"></i></div></div>
                        <div class="circle-label">Style Edits</div>
                    </div>
                    <div class="circle-item">
                        <div class="circle-icon-wrap">
                            <div class="circle-ring"><div class="circle-inner"><i data-lucide="shirt"></i></div></div>
                            <div class="coming-soon">Coming Soon</div>
                        </div>
                        <div class="circle-label">Digital Wardrobe</div>
                    </div>
                </div>
            </div>

            <button class="pill-btn">BOOK A SERVICE</button>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
